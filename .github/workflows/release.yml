name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Build exe
        run: uv run pyinstaller --onefile --noconsole --name dualsense-util app.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dualsense-util
          path: dist/dualsense-util.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/dualsense-util.exe
